<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Trainer</title>
<style>
body { font-family: Arial; text-align: center; padding: 20px; }
input, button { padding: 10px; margin: 5px; font-size: 16px; }
.word { margin: 10px; }
</style>
</head>

<body>

<h1>Word Trainer</h1>

<div id="addMode">
  <input id="eng" placeholder="English word"><br>
  <input id="swe" placeholder="Swedish word"><br>
  <button onclick="addWord()">Add Word</button>
  <button onclick="startQuiz()">Start Quiz</button>
</div>

<div id="quizMode" style="display:none;">
  <h2 id="question"></h2>
  <input id="answer" placeholder="Your answer"><br>
  <button onclick="checkAnswer()">Check</button>
  <p id="result"></p>
  <p id="score"></p>
  <button onclick="nextWord()">Next</button>
  <button onclick="back()">Back</button>
</div>

<div id="list"></div>

<script>
let words = JSON.parse(localStorage.getItem("words")) || [];
let current = null;
let askEngToSwe = true;
let score = 0;
let total = 0;

function save() {
  localStorage.setItem("words", JSON.stringify(words));
}

function addWord() {
  let eng = document.getElementById("eng").value;
  let swe = document.getElementById("swe").value;
  
  if (eng && swe) {
    words.push({eng, swe});
    save();
    renderList();
  }
}

function renderList() {
  let list = document.getElementById("list");
  list.innerHTML = words.map(w => 
    `<div class="word">${w.eng} = ${w.swe}</div>`
  ).join("");
}

function startQuiz() {
  if (words.length === 0) return;
  document.getElementById("addMode").style.display = "none";
  document.getElementById("quizMode").style.display = "block";
  score = 0;
  total = 0;
  nextWord();
}

function nextWord() {
  current = words[Math.floor(Math.random() * words.length)];
  askEngToSwe = Math.random() < 0.5;
  
  document.getElementById("question").innerText =
    askEngToSwe ? current.eng : current.swe;
  
  document.getElementById("answer").value = "";
  document.getElementById("result").innerText = "";
  document.getElementById("score").innerText = `Score: ${score}/${total}`;
}

function checkAnswer() {
  let answer = document.getElementById("answer").value.trim().toLowerCase();
  let correct = askEngToSwe ? current.swe : current.eng;
  
  total++;
  
  if (answer === correct.toLowerCase()) {
    score++;
    document.getElementById("result").innerText = "✅ Correct!";
  } else {
    document.getElementById("result").innerText = "❌ Correct: " + correct;
  }
  
  document.getElementById("score").innerText = `Score: ${score}/${total}`;
}

function back() {
  document.getElementById("addMode").style.display = "block";
  document.getElementById("quizMode").style.display = "none";
}

renderList();
</script>

</body>
</html>
